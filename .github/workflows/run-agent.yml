name: Weather Agent Runner

on:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes
  workflow_dispatch:

jobs:
  permissions:
    contents: write
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        run: python main.py

      - name: Commit updated memory
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add memory.json
          git commit -m "Update weather memory" || echo "No changes"
          git push